<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard</title>
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <main>
            <div class="container">
                <h1 class="title">User Profile</h1>
                <div class="profile">
                    <p class="validation-msg"></p>
                    <h2 class="profile-item__value" id="nameValue"></h2>
                    <p class="profile-item__value" id="emailValue"></p>
                    <p class="profile-item__value" id="roleValue"></p>

                    <div>
                        <span class="member-since-text">Member Since</span>
                        <p
                            class="profile-item__value"
                            id="memberSinceValue"
                        ></p>
                    </div>
                </div>

                <div>
                    <button id="logoutBtn" class="btn--submit" type="button">
                        Logout
                    </button>
                </div>
            </div>
        </main>
        <script type="module" src="./js/dashboard.js"></script>
    </body>
</html>
