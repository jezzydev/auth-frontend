<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard</title>
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <main>
            <div class="container">
                <h1 class="title">User Profile</h1>
                <div>
                    <ul class="profile">
                        <li class="profile__item">
                            <p class="profile-item__key">Name</p>
                            <p class="profile-item__value">John Smith</p>
                        </li>
                        <li class="profile__item">
                            <p class="profile-item__key">Email</p>
                            <p class="profile-item__value">john@gmail.com</p>
                        </li>
                    </ul>
                </div>

                <div>
                    <button class="btn--submit" type="submit">Logout</button>
                </div>
            </div>
        </main>
    </body>
</html>
