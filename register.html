<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registration</title>
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <main>
            <div class="container">
                <h1 class="title">Registration</h1>
                <div>
                    <form id="registerForm">
                        <p class="validation-msg"></p>
                        <div class="field-container">
                            <label for="name">Name</label>
                            <input
                                id="name"
                                name="name"
                                type="text"
                                aria-describedby="name-error"
                                aria-invalid="false"
                                required
                            />
                            <span
                                id="name-error"
                                class="error-message"
                                role="alert"
                            ></span>
                        </div>
                        <div class="field-container">
                            <label for="email">Email</label>
                            <input
                                id="email"
                                name="email"
                                type="email"
                                aria-describedby="email-error"
                                aria-invalid="false"
                                required
                            />
                            <span
                                id="email-error"
                                class="error-message"
                                role="alert"
                            ></span>
                        </div>
                        <div class="field-container">
                            <label for="password">Password</label>
                            <input
                                id="password"
                                name="password"
                                type="password"
                                aria-describedby="password-error"
                                aria-invalid="false"
                                required
                            />
                            <span
                                id="password-error"
                                class="error-message"
                                role="alert"
                            ></span>
                        </div>
                        <div class="field-container">
                            <label for="bdate">Date of Birth</label>
                            <input
                                id="bdate"
                                name="bdate"
                                type="date"
                                aria-describedby="bdate-error"
                                aria-invalid="false"
                                required
                            />
                            <span
                                id="bdate-error"
                                class="error-message"
                                role="alert"
                            ></span>
                        </div>
                        <div class="field-container">
                            <label for="role">Role</label>
                            <select
                                id="role"
                                name="role"
                                aria-describedby="role-error"
                                aria-invalid="false"
                                required
                            >
                                <button>
                                    <selectedcontent></selectedcontent>
                                </button>
                                <option>User</option>
                                <option>Admin</option>
                            </select>
                            <span
                                id="role-error"
                                class="error-message"
                                role="alert"
                            ></span>
                        </div>
                        <div>
                            <button
                                id="registerBtn"
                                class="btn--submit"
                                type="submit"
                            >
                                Register
                            </button>
                        </div>
                    </form>
                    <p class="register__back-to-login-text">
                        Go back to <a href="index.html">Login</a>
                    </p>
                </div>
            </div>
        </main>
        <script type="module" src="./js/register.js"></script>
    </body>
</html>
